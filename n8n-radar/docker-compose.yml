services:
  n8n-radar:
    build: .
    ports:
      - "3000:3000"
    environment:
      - N8N_BASE_URL
      - N8N_API_KEY
      - DASHBOARD_USER
      - DASHBOARD_PASSWORD
      - DASHBOARD_KEY
      - SUPABASE_URL
      - SUPABASE_ANON_KEY
      - NEXT_PUBLIC_POLL_INTERVAL
    restart: unless-stopped
